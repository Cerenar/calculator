<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calcin' with the boys</title>
	<link rel="stylesheet" href="styles.css"/>
	<script src="calculator.js" defer></script>
</head>
<body>
	<div id="calculator">
		<div id="container">
			<div id="display"></div>
			<div id="buttons-container">
				<div class="left">
					<button class="special-func">C</button>
					<button>7</button>
					<button>4</button>
					<button>1</button>
					<button>0</button>
				</div>
				<div class="middle-left">
					<button class="special-func">+/-</button>
					<button>8</button>
					<button>5</button>
					<button>2</button>
					<button>.</button>
				</div>
				<div class="middle-right">
					<button class="special-func">%</button>
					<button>9</button>
					<button>6</button>
					<button>3</button>
					<button class="operator">←</button>
				</div>
				<div class="right">
					<button class="operator">/</button>
					<button class="operator">*</button>
					<button class="operator">-</button>
					<button class="operator">+</button>
					<button id="enter">=</button>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
