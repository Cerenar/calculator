<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calcin' with the boys</title>
	<link rel="stylesheet" href="styles.css"/>
	<script src="calculator.js" defer></script>
</head>
<body>
	<div id="calculator">
		<div id="container">
			<div id="display"></div>
			<div id="buttons-container">
				<div class="left">
					<button id="clear" class="special-func">C</button>
					<button class="operand">7</button>
					<button class="operand">4</button>
					<button class="operand">1</button>
					<button class="operand">0</button>
				</div>
				<div class="middle-left">
					<button id="invert" class="special-func">+/-</button>
					<button class="operand">8</button>
					<button class="operand">5</button>
					<button class="operand">2</button>
					<button class="operand">.</button>
				</div>
				<div class="middle-right">
					<button id="percent" class="special-func">%</button>
					<button class="operand">9</button>
					<button class="operand">6</button>
					<button class="operand">3</button>
					<button id="backspace" class="special-func">←</button>
				</div>
				<div class="right">
					<button id="divide" class="operator">/</button>
					<button id="multiply" class="operator">*</button>
					<button id="subtract" class="operator">-</button>
					<button id="add" class="operator">+</button>
					<button id="enter" class="operator">=</button>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
